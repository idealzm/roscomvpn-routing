name: Update Routing Configs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "LICENSE"
  repository_dispatch:
    types: [update-routing-configs]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Update HAPP configs
        shell: bash
        run: |
          set -euo pipefail
          export TZ=UTC

          GEOIP_REPO="hydraponique/roscomvpn-geoip"
          GEOSITE_REPO="hydraponique/roscomvpn-geosite"

          latest_tag() {
            git ls-remote --tags "https://github.com/${1}.git" \
              | awk '{print $2}' \
              | sed -E 's@refs/tags/@@; s@\^\{\}@@' \
              | grep -E '^[0-9]{12}$' \
              | sort -r \
              | head -n 1
          }

          epoch_to_tag_utc() {
            local e="${1:-0}"
            if [[ "$e" =~ ^[0-9]+$ ]] && (( e > 0 )); then
              date -u -d "@$e" +%Y%m%d%H%M
            else
              printf '000000000000'
            fi
          }

          current_epoch="$(jq -r '.LastUpdated // empty' HAPP/DEFAULT.JSON 2>/dev/null || true)"
          [[ "$current_epoch" =~ ^[0-9]+$ ]] || current_epoch="0"
          current_tag="$(epoch_to_tag_utc "$current_epoch")"

          geoip_tag="$(latest_tag "$GEOIP_REPO")"
          geosite_tag="$(latest_tag "$GEOSITE_REPO")"
          [[ -n "$geoip_tag" && -n "$geosite_tag" ]]

          max_tag="$(printf "%s\n%s\n" "$geoip_tag" "$geosite_tag" | sort -r | head -n 1)"

          if [[ "$current_tag" < "$max_tag" ]]; then
            now_epoch="$(date -u +%s)"
            geoip_url="https://cdn.jsdelivr.net/gh/${GEOIP_REPO}@${geoip_tag}/release/geoip.dat"
            geosite_url="https://cdn.jsdelivr.net/gh/${GEOSITE_REPO}@${geosite_tag}/release/geosite.dat"

            curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused -I "$geoip_url" >/dev/null
            curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused -I "$geosite_url" >/dev/null

            for f in HAPP/DEFAULT.JSON HAPP/WHITELIST.JSON HAPP/JSONSUB.JSON; do
              tmp="$(mktemp)"
              jq \
                --arg ts "$now_epoch" \
                --arg geoip "$geoip_url" \
                --arg geosite "$geosite_url" \
                '.LastUpdated = $ts | .Geoipurl = $geoip | .Geositeurl = $geosite' \
                "$f" > "$tmp"
              mv "$tmp" "$f"
            done
          fi

          for variant in DEFAULT WHITELIST JSONSUB; do
            b64="$(jq -c . "HAPP/${variant}.JSON" | base64 -w 0)"
            printf 'happ://routing/onadd/%s\n' "$b64" > "HAPP/${variant}.DEEPLINK"
          done

      - name: Update INCY configs
        shell: bash
        run: |
          set -euo pipefail
          export TZ=UTC

          GEOIP_REPO="hydraponique/roscomvpn-geoip"
          GEOSITE_REPO="hydraponique/roscomvpn-geosite"

          latest_tag() {
            git ls-remote --tags "https://github.com/${1}.git" \
              | awk '{print $2}' \
              | sed -E 's@refs/tags/@@; s@\^\{\}@@' \
              | grep -E '^[0-9]{12}$' \
              | sort -r \
              | head -n 1
          }

          epoch_to_tag_utc() {
            local e="${1:-0}"
            if [[ "$e" =~ ^[0-9]+$ ]] && (( e > 0 )); then
              date -u -d "@$e" +%Y%m%d%H%M
            else
              printf '000000000000'
            fi
          }

          current_epoch="$(jq -r '.LastUpdated // empty' INCY/DEFAULT.JSON 2>/dev/null || true)"
          [[ "$current_epoch" =~ ^[0-9]+$ ]] || current_epoch="0"
          current_tag="$(epoch_to_tag_utc "$current_epoch")"

          geoip_tag="$(latest_tag "$GEOIP_REPO")"
          geosite_tag="$(latest_tag "$GEOSITE_REPO")"
          [[ -n "$geoip_tag" && -n "$geosite_tag" ]]

          max_tag="$(printf "%s\n%s\n" "$geoip_tag" "$geosite_tag" | sort -r | head -n 1)"

          if [[ "$current_tag" < "$max_tag" ]]; then
            now_epoch="$(date -u +%s)"
            geoip_url="https://cdn.jsdelivr.net/gh/${GEOIP_REPO}/release/geoip.dat"
            geosite_url="https://cdn.jsdelivr.net/gh/${GEOSITE_REPO}/release/geosite.dat"

            curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused -I "$geoip_url" >/dev/null
            curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused -I "$geosite_url" >/dev/null

            for f in INCY/DEFAULT.JSON INCY/WHITELIST.JSON INCY/JSONSUB.JSON; do
              tmp="$(mktemp)"
              jq \
                --arg ts "$now_epoch" \
                --arg geoip "$geoip_url" \
                --arg geosite "$geosite_url" \
                '.LastUpdated = $ts | .Geoipurl = $geoip | .Geositeurl = $geosite' \
                "$f" > "$tmp"
              mv "$tmp" "$f"
            done
          fi

          for variant in DEFAULT WHITELIST JSONSUB; do
            b64="$(jq -c . "INCY/${variant}.JSON" | base64 -w 0)"
            printf 'incy://routing/onadd/%s\n' "$b64" > "INCY/${variant}.DEEPLINK"
          done

      - name: Ensure Name is el-duckVPN
        shell: bash
        run: |
          set -euo pipefail
          for f in HAPP/DEFAULT.JSON HAPP/WHITELIST.JSON HAPP/JSONSUB.JSON INCY/DEFAULT.JSON INCY/WHITELIST.JSON INCY/JSONSUB.JSON; do
            current_name="$(jq -r '.Name' "$f")"
            if [[ "$current_name" != "el-duckVPN" ]]; then
              tmp="$(mktemp)"
              jq '.Name = "el-duckVPN"' "$f" > "$tmp"
              mv "$tmp" "$f"
            fi
          done

          for variant in DEFAULT WHITELIST JSONSUB; do
            b64="$(jq -c . "HAPP/${variant}.JSON" | base64 -w 0)"
            printf 'happ://routing/onadd/%s\n' "$b64" > "HAPP/${variant}.DEEPLINK"
          done
          for variant in DEFAULT WHITELIST JSONSUB; do
            b64="$(jq -c . "INCY/${variant}.JSON" | base64 -w 0)"
            printf 'incy://routing/onadd/%s\n' "$b64" > "INCY/${variant}.DEEPLINK"
          done

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail
          export TZ=UTC

          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add HAPP/DEFAULT.JSON HAPP/WHITELIST.JSON HAPP/JSONSUB.JSON HAPP/DEFAULT.DEEPLINK HAPP/WHITELIST.DEEPLINK HAPP/JSONSUB.DEEPLINK INCY/DEFAULT.JSON INCY/WHITELIST.JSON INCY/JSONSUB.JSON INCY/DEFAULT.DEEPLINK INCY/WHITELIST.DEEPLINK INCY/JSONSUB.DEEPLINK

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "$(date -u +%Y%m%d%H%M)"
          git push